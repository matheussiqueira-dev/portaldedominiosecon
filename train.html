<!doctype html>
<html>
  <head>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        background: #111;
        color: #fff;
        font-family: sans-serif;
      }

      .app {
        width: min(920px, 95vw);
      }

      .center {
        place-items: center;
      }

      .camera-frame {
        position: relative;
        width: 640px;
        height: 480px;
      }

      #video,
      #overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
      }

      #overlay {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="top">
        <h2>Hand Sign Trainer</h2>
        <p class="sub">Hold a handsign!</p>
      </section>

      <section class="stage center">
        <div class="camera-frame">
          <video id="video" autoplay playsinline></video>
          <canvas id="overlay" width="640" height="480"></canvas>
        </div>

        <div class="controls center">
          <select id="classSelect"></select>
          <button id="collectClass">Collect Class</button>
          <button id="stopCollect">Stop Collect</button>
          <button id="train">Train</button>
          <button id="predict">Start Predict</button>
          <button id="saveModel">Save Model</button>
        </div>
        <p id="status">Status: idle</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script type="module" src="./train.js"></script>
  </body>
</html>
