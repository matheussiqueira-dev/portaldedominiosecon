<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Void Detector</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f1115;
        color: #e8eef8;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      #bg3d {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      .app {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 3;
        padding: 12px 14px;
        border-radius: 10px;
        background: rgba(15, 17, 21, 0.55);
        backdrop-filter: blur(3px);
      }

      .app h2 {
        margin: 0 0 8px;
      }

      #status {
        margin: 0;
      }

      .camera-frame {
        position: fixed;
        right: 16px;
        bottom: 16px;
        width: min(38vw, 420px);
        aspect-ratio: 4 / 3;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(232, 238, 248, 0.22);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        z-index: 4;
        background: #000;
      }

      #video,
      #overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
      }

      #overlay {
        pointer-events: none;
      }

      @media (max-width: 700px) {
        .camera-frame {
          width: min(52vw, 280px);
        }
      }
    </style>
  </head>
  <body>
    <div id="bg3d" aria-hidden="true"></div>

    <main class="app">
      <h2>Infinite Void Detector</h2>
      <p id="status">Status: starting...</p>
    </main>

    <div class="camera-frame">
      <video id="video" autoplay playsinline></video>
      <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="./background-scene.js"></script>
    <script src="./hand-features.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
